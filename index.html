  <meta name="theme-color" content="#0A0A0F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root {
      --bg-base:      #0A0A0F;
      --bg-surface:   #12121A;
      --bg-card:      rgba(255,255,255,0.04);
      --amber:        #F59E0B;
      --amber-dim:    rgba(245,158,11,0.15);
      --amber-glow:   rgba(245,158,11,0.3);
      --text-primary: #F0EDE6;
      --text-muted:   #5A5754;
      --player-h:     110px;
      --safe-bottom:  env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-base); color: var(--text-primary);
      font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 70% 50% at 50% -10%, rgba(245,158,11,0.09) 0%, transparent 60%);
      z-index: 0;
    }

    /* ── Layout ─────────── */
    #app {
      position: relative; z-index: 1; min-height: 100dvh;
      padding-bottom: calc(var(--player-h) + var(--safe-bottom) + 20px);
    }
    header { padding: 52px 24px 12px; }
    header .sub { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: .18em; color: var(--amber); text-transform: uppercase; margin-bottom: 4px; }
    h1 { font-size: 26px; font-weight: 700; letter-spacing: -.02em; }

    /* ── Region tabs ────── */
    .region-scroll-wrap { overflow-x: auto; padding: 14px 16px; display: flex; gap: 10px; scrollbar-width: none; }
    .region-scroll-wrap::-webkit-scrollbar { display: none; }
    .region-tab {
      flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1); background: var(--bg-card);
      color: #9D9A94; font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer; white-space: nowrap;
      transition: background .15s, border-color .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .region-tab.active { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }

    /* ── Station groups ─── */
    .region-group { display: none; }
    .region-group.visible { display: block; }
    .region-label {
      font-size: 10px; color: var(--text-muted); padding: 12px 24px 10px;
      text-transform: uppercase; font-family: 'Space Mono', monospace; letter-spacing: .1em;
    }
    #station-list { display: flex; flex-direction: column; gap: 8px; padding: 0 16px 8px; }

    /* ── Station card ───── */
    .station-card {
      display: flex; align-items: center; gap: 14px; padding: 13px 14px;
      background: var(--bg-card); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; cursor: pointer; min-height: 68px;
      transition: background .18s, border-color .18s, transform .1s;
      -webkit-tap-highlight-color: transparent; position: relative; overflow: hidden;
    }
    .station-card:active { transform: scale(.98); }
    .station-card:hover, .station-card:focus-visible {
      background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.14); outline: none;
    }
    .station-card.active {
      background: var(--amber-dim); border-color: rgba(245,158,11,.45);
    }
    .station-card.active::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--amber); border-radius: 0 2px 2px 0;
    }
    .station-card.error { border-color: rgba(239,68,68,.5); }

    .s-icon {
      width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
      background: rgba(255,255,255,0.06); display: flex; align-items: center;
      justify-content: center; font-size: 20px; transition: background .2s;
    }
    .station-card.active .s-icon { background: var(--amber-dim); }
    .s-info { flex: 1; min-width: 0; }
    .s-name {
      font-size: 14px; font-weight: 500; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; color: var(--text-primary);
    }
    .s-meta {
      font-size: 11px; color: var(--text-muted); margin-top: 2px;
      font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: .05em;
    }
    .station-card.active .s-name { color: var(--amber); }

    /* Equalizer animation */
    .eq-bars { display: none; align-items: flex-end; gap: 2px; height: 16px; flex-shrink: 0; }
    .station-card.active.playing .eq-bars { display: flex; }
    .eq-bar { width: 3px; background: var(--amber); border-radius: 2px; animation: eq .9s ease-in-out infinite alternate; }
    .eq-bar:nth-child(1){animation-duration:.7s}
    .eq-bar:nth-child(2){animation-duration:.5s;animation-delay:.1s}
    .eq-bar:nth-child(3){animation-duration:.6s;animation-delay:.05s}
    .eq-bar:nth-child(4){animation-duration:.8s;animation-delay:.15s}
    @keyframes eq { from{height:4px;opacity:.5} to{height:16px;opacity:1} }

    /* ── Player ─────────── */
    #player {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      padding: 14px 16px calc(14px + var(--safe-bottom));
      background: rgba(10,10,20,.92);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      border-top: 1px solid rgba(255,255,255,.1);
    }
    #player::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--amber), rgba(245,158,11,.15));
      opacity: 0; transition: opacity .3s;
    }
    #player.active::before { opacity: 1; }
    .player-inner { display: flex; align-items: center; gap: 15px; max-width: 600px; margin: 0 auto; }
    .p-art {
      width: 48px; height: 48px; border-radius: 10px; flex-shrink: 0;
      background: var(--bg-surface); border: 1px solid rgba(255,255,255,.08);
      display: flex; align-items: center; justify-content: center; font-size: 24px;
      transition: border-color .3s;
    }
    #player.active .p-art { border-color: rgba(245,158,11,.4); }
    .p-meta { flex: 1; min-width: 0; }
    #p-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #p-status { font-size: 11px; color: #888; font-family: 'Space Mono', monospace; margin-top: 2px; }
    #play-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--amber); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      box-shadow: 0 0 20px var(--amber-glow);
      transition: transform .12s, box-shadow .2s, background .2s;
      -webkit-tap-highlight-color: transparent;
    }
    #play-btn:active { transform: scale(.93); box-shadow: 0 0 10px var(--amber-glow); }
    #play-btn:disabled { background: #3A3A40; box-shadow: none; cursor: default; }
    .icon-play { width: 0; height: 0; border-style: solid; border-width: 9px 0 9px 15px; border-color: transparent transparent transparent #0A0A0F; margin-left: 3px; }
    .icon-pause { display: none; gap: 5px; }
    .icon-pause span { display: block; width: 4px; height: 16px; background: #0A0A0F; border-radius: 2px; }
    .icon-spin { display: none; width: 22px; height: 22px; border: 3px solid rgba(10,10,15,.3); border-top-color: #0A0A0F; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin{to{transform:rotate(360deg)}}
    #play-btn.loading .icon-play { display: none; }
    #play-btn.loading .icon-pause { display: none; }
    #play-btn.loading .icon-spin { display: block; }
    #play-btn.playing .icon-play { display: none; }
    #play-btn.playing .icon-pause { display: flex; }

    /* ── Mixed-content modal ─ */
    #guide-modal {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
      align-items: center; justify-content: center; padding: 24px;
    }
    .modal-box {
      background: #1A1A22; padding: 24px; border-radius: 20px;
      max-width: 380px; width: 100%; border: 1px solid rgba(245,158,11,.4);
    }
    .modal-box h3 { color: var(--amber); margin-bottom: 10px; font-size: 16px; }
    .step-box { background: rgba(255,255,255,0.05); padding: 12px; margin: 14px 0; border-radius: 10px; font-size: 13px; line-height: 1.65; color: #ccc; }
    .btn-reload { background: var(--amber); border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; color: #000; font-size: 14px; }
    #audio { display: none; }
  </style>
</head>

<div id="app">

    </button>

</div>

<!-- Mixed-content guide modal -->

    <div class="step-box">
      <strong>💻 電腦 Chrome / Edge</strong><br>
      點網址列左側「鎖頭」→「網站設定」<br>→ 找「不安全內容」→ 設為「允許」<br><br>
      <strong>📱 Android Chrome</strong><br>
      點右上角「⋮」→「網站設定」→ 允許不安全內容<br><br>
      <strong>📱 iOS Safari</strong><br>
      設定 → Safari → 進階 → 允許不安全網站
    </div>
    <button class="btn-reload" onclick="document.getElementById('guide-modal').style.display='none'; location.reload()">✓ 已設定，重新整理</button>
  </div>
</div>

// ── Build tabs ─────────────────────────────────────────────────
function mkTab(id, label, active) {
  const btn = document.createElement('button');
  btn.className = 'region-tab' + (active ? ' active' : '');
  btn.textContent = label;
  btn.dataset.rid = id;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.region-tab').forEach(t => t.classList.toggle('active', t.dataset.rid === id));
    document.querySelectorAll('.region-group').forEach(g => g.classList.toggle('visible', id === 'all' || g.dataset.rid === id));
  });
  tabsEl.appendChild(btn);
}
mkTab('all', '全部', true);
regions.forEach(r => mkTab(r.id, r.label, false));

  group.dataset.rid = region.id;

  const lbl = document.createElement('div');
  lbl.className = 'region-label';
  lbl.textContent = region.label;
  group.appendChild(lbl);

    const card = document.createElement('div');
    card.className = 'station-card';
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.innerHTML =
      `<div class="s-icon">${s.icon}</div>` +
      `<div class="s-info">` +
        `<div class="s-name">${s.name}</div>` +
        `<div class="s-meta">${s.genre}</div>` +
      `</div>` +
      `<div class="eq-bars">` +
        `<div class="eq-bar"></div><div class="eq-bar"></div>` +
        `<div class="eq-bar"></div><div class="eq-bar"></div>` +
      `</div>`;
    card.addEventListener('click', () => onCardClick(s, card));
    card.addEventListener('keydown', e => (e.key === 'Enter' || e.key === ' ') && onCardClick(s, card));
    group.appendChild(card);
    allCards.push({ card, station: s });
  });

  listEl.appendChild(group);
});

// ── Playback ───────────────────────────────────────────────────
function onCardClick(s, card) {
  if (currentStation && currentStation.name === s.name) {
    togglePlay();
    return;
  }
  loadStation(s, card);
}

function loadStation(s, card) {
  if (hls) { hls.destroy(); hls = null; }
  audio.pause();
  audio.src = '';

  currentStation = s;
  allCards.forEach(({ card: c }) => { c.classList.remove('active', 'playing', 'error'); });
  card.classList.add('active');

  btnEl.disabled  = false;
  btnEl.className = 'loading';
  nameEl.textContent  = s.name;
  statusEl.textContent = '載入中…';
  statusEl.style.color = '#888';
  artEl.textContent   = s.icon;
  playerEl.classList.add('active');

  const url = s.url;
  const isHLS = /\.(m3u8|m3u)/.test(url) || /playlist|chunklist/.test(url);

  if (isHLS) {
    if (Hls.isSupported()) {
      hls = new Hls({ enableWorker: true });
      hls.loadSource(url);
      hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play().catch(e => handleErr(e, card)));
      hls.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) handleErr(null, card); });
    } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      audio.src = url;
      audio.play().catch(e => handleErr(e, card));
    }
  } else {
    audio.src = url;
    audio.play().catch(e => handleErr(e, card));
  }

  setupMediaSession(s);
}

function handleErr(err, card) {
  card.classList.add('error');
  btnEl.className     = '';
  statusEl.textContent = '❌ 播放失敗';
  statusEl.style.color = '#ef4444';
  // Show mixed-content guide only for HTTP streams on HTTPS pages
  if (window.location.protocol === 'https:' && currentStation && currentStation.url.startsWith('http:')) {
    document.getElementById('guide-modal').style.display = 'flex';
  }
}

function togglePlay() {
  if (!currentStation) return;
  isPlaying ? audio.pause() : audio.play().catch(() => {});
}

btnEl.addEventListener('click', togglePlay);

audio.addEventListener('playing', () => {
  isPlaying = true;
  btnEl.className = 'playing';
  statusEl.textContent = '● 直播中';
  statusEl.style.color = '#F59E0B';
  allCards.forEach(({ card, station }) => {
    if (station.name === currentStation?.name) card.classList.add('playing');
  });
});
audio.addEventListener('pause', () => {
  isPlaying = false;
  btnEl.className = '';
  statusEl.textContent = '已暫停';
  statusEl.style.color = '#888';
  allCards.forEach(({ card }) => card.classList.remove('playing'));
});
audio.addEventListener('waiting', () => {
  btnEl.className = 'loading';
  statusEl.textContent = '緩衝中…';
  statusEl.style.color = '#888';
});
audio.addEventListener('error', () => {
  const card = allCards.find(({ station }) => station.name === currentStation?.name)?.card;
  if (card) handleErr(null, card);
});

function setupMediaSession(s) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title:  s.name,
    artist: '台灣廣播 Radiolist',
    album:  'Live FM Radio',
    artwork: [{ src: 'https://cdn-icons-png.flaticon.com/512/3239/3239594.png', sizes: '512x512', type: 'image/png' }]
  });
  navigator.mediaSession.setActionHandler('play',  () => audio.play());
  navigator.mediaSession.setActionHandler('pause', () => audio.pause());
}
</script>
