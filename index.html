    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --bg-base: #0A0A0F; --bg-surface: #12121A; --bg-card: rgba(255,255,255,0.04);

      --text-muted: #5A5754; --player-h: 110px; --safe-bottom: env(safe-area-inset-bottom, 0px);

    body { background: var(--bg-base); color: var(--text-primary); font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
    #app { padding-bottom: calc(var(--player-h) + var(--safe-bottom)); min-height: 100vh; }
    header { padding: 48px 24px 12px; }
    h1 { font-size: 24px; font-weight: 700; }
    .region-scroll-wrap { overflow-x: auto; padding: 0 16px 16px; display: flex; gap: 10px; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }

    .region-tab { flex-shrink: 0; padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: var(--bg-card); color: #9D9A94; font-size: 13px; cursor: pointer; }
    .region-tab.active { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
    .region-group { display: none; }
    .region-group.visible { display: block; }
    .region-label { font-size: 11px; color: var(--text-muted); padding: 12px 24px; text-transform: uppercase; letter-spacing: 1px; }
    #station-list { display: flex; flex-direction: column; gap: 8px; padding: 0 16px; }
    .station-card { display: flex; align-items: center; gap: 14px; padding: 14px; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; cursor: pointer; transition: 0.2s; }
    .station-card.active { border-color: var(--amber); background: var(--amber-dim); }
    .station-card.error { border-color: #ef4444; opacity: 0.7; }
    #player { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding: 16px 16px calc(16px + var(--safe-bottom)); background: rgba(10,10,20,0.92); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.1); }
    .player-inner { display: flex; align-items: center; gap: 15px; max-width: 600px; margin: 0 auto; }
    #play-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--amber); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .icon-play { width: 0; height: 0; border-style: solid; border-width: 9px 0 9px 15px; border-color: transparent transparent transparent #000; margin-left: 3px; }
    .icon-pause { display: none; gap: 4px; }
    .icon-pause span { width: 4px; height: 16px; background: #000; border-radius: 2px; }
    #play-btn.playing .icon-play { display: none; }
    #play-btn.playing .icon-pause { display: flex; }

// ══════════════════════════════════════════════════════════
//  補強後的播放邏輯
// ══════════════════════════════════════════════════════════
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const statusEl = document.getElementById('p-status');
const nameEl = document.getElementById('p-name');
const iconEl = document.getElementById('p-icon');
let hls = null;

// Hls.js 配置
const hlsConfig = {
    enableWorker: true,
    maxBufferLength: 30,
    manifestLoadingMaxRetry: 5,
    manifestLoadingRetryDelay: 1000
};

function loadStation(s, card) {
    document.querySelectorAll('.station-card').forEach(c => c.classList.remove('active', 'error'));
    card.classList.add('active');
    
    nameEl.innerText = s.name;
    iconEl.innerText = s.icon;
    statusEl.innerText = '載入中...';
    statusEl.style.color = '#888';

    if (hls) { hls.destroy(); hls = null; }
    audio.pause();
    audio.src = '';
    audio.volume = s.volume || 1.0;

    const isHls = s.url.includes('.m3u8') || s.url.includes('playlist');

    if (isHls) {
        if (Hls.isSupported()) {
            hls = new Hls(hlsConfig);
            hls.loadSource(s.url);
            hls.attachMedia(audio);
            hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play().catch(handlePlayError));
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    statusEl.innerText = '連線失敗 (HLS)';
                    card.classList.add('error');
                }
            });
        } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
            audio.src = s.url;
            audio.play().catch(handlePlayError);
        }
    } else {
        audio.src = s.url;
        audio.play().catch(e => {
            statusEl.innerText = '瀏覽器阻擋 (不安全連線)';
            statusEl.style.color = '#ef4444';
            card.classList.add('error');
        });
    }
}

function handlePlayError() {
    statusEl.innerText = '播放失敗，請檢查權限設定';
    statusEl.style.color = '#ef4444';
}

audio.onplaying = () => {
    statusEl.innerText = '● 直播中';
    statusEl.style.color = '#F59E0B';
    playBtn.classList.add('playing');
};
audio.onpause = () => playBtn.classList.remove('playing');
audio.onwaiting = () => statusEl.innerText = '緩衝中...';

playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();

// 初始化介面
function init() {
    const tabs = document.getElementById('region-tabs');
    const list = document.getElementById('station-list');
    
    regions.forEach((r, idx) => {
        const btn = document.createElement('button');
        btn.className = 'region-tab' + (idx===0?' active':'');
        btn.innerText = r.label;
        btn.onclick = () => {
            document.querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.region-group').forEach(g => g.classList.toggle('visible', g.dataset.id === r.id));
        };
        tabs.appendChild(btn);

        const group = document.createElement('div');
        group.className = 'region-group' + (idx===0?' visible':'');
        group.dataset.id = r.id;
        group.innerHTML = `<div class="region-label">${r.label}</div>`;
        
        r.stations.forEach(s => {
            const card = document.createElement('div');
            card.className = 'station-card';
            card.innerHTML = `<div style="font-size:22px;">${s.icon}</div>
                              <div style="flex:1; min-width:0;">
                                <div style="font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.name}</div>
                                <div style="font-size:11px;color:#666;">${s.genre || 'LIVE'}</div>
                              </div>`;
            card.onclick = () => loadStation(s, card);
            group.appendChild(card);
        });
        list.appendChild(group);
    });

    if ('mediaSession' in navigator) {
        audio.addEventListener('play', () => {
            const s = regions.flatMap(r => r.stations).find(st => st.name === nameEl.innerText);
            navigator.mediaSession.metadata = new MediaMetadata({
                title: s?.name || '台灣廣播',
                artist: 'Live Radio',
                artwork: [{ src: 'icon-cute-radio.png', sizes: '512x512', type: 'image/png' }]
            });
        });
        navigator.mediaSession.setActionHandler('play', () => audio.play());
        navigator.mediaSession.setActionHandler('pause', () => audio.pause());
    }
}
init();
</script>
