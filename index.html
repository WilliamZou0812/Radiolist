    #play-pause-btn.playing .icon-play { display: none; }

// 核心播放邏輯
const audio = document.getElementById('audio');
const listEl = document.getElementById('station-list');
const playBtn = document.getElementById('play-pause-btn');
const tabsEl = document.getElementById('region-tabs');
let hls = null, currentStation = null;

// 生成分頁標籤
function makeTab(id, label, active) {
  const btn = document.createElement('button');
  btn.className = 'region-tab' + (active ? ' active' : '');
  btn.textContent = label;
  btn.onclick = () => {
    document.querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.region-group').forEach(g => g.classList.toggle('visible', id === 'all' || g.dataset.region === id));
  };
  tabsEl.appendChild(btn);
}
makeTab('all', '全部', true);
regions.forEach(r => makeTab(r.id, r.label, false));

// 生成電台卡片
regions.forEach(region => {
  const group = document.createElement('div');
  group.className = 'region-group visible';
  group.dataset.region = region.id;
  group.innerHTML = `<div class="region-label">${region.label}</div>`;
  
  region.stations.forEach(s => {
    const card = document.createElement('div');
    card.className = 'station-card';
    card.innerHTML = `<span style="font-size:22px;">${s.icon}</span><div><div style="font-size:14px; font-weight:500;">${s.name}</div><div style="font-size:11px; color:#888;">${s.genre}</div></div>`;
    card.onclick = () => loadStation(s, card);
    group.appendChild(card);
  });
  listEl.appendChild(group);
});

function loadStation(s, card) {
  document.querySelectorAll('.station-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  document.getElementById('p-name').innerText = s.name;
  document.getElementById('p-icon').innerText = s.icon;
  document.getElementById('p-status').innerText = '載入中...';
  
  if (hls) { hls.destroy(); hls = null; }
  audio.pause();
  audio.volume = s.volume || 1.0;

  if (s.url.includes('.m3u8')) {
    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(s.url);
      hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play().catch(()=>{}));
    } else {
      audio.src = s.url; audio.play().catch(()=>{});
    }
  } else {
    audio.src = s.url; audio.play().catch(()=>{});
  }
  
  audio.onplaying = () => {
    document.getElementById('p-status').innerText = '● 直播中';
    playBtn.classList.add('playing');
  };
  audio.onpause = () => playBtn.classList.remove('playing');
}

playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();
