  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base:       #0A0A0F;
      --bg-surface:    #12121A;
      --bg-card:       rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.08);
      --border:        rgba(255,255,255,0.08);
      --border-hover:  rgba(255,255,255,0.18);
      --amber:         #F59E0B;
      --amber-dim:     rgba(245,158,11,0.15);
      --amber-glow:    rgba(245,158,11,0.35);
      --text-primary:  #F0EDE6;
      --text-secondary:#9D9A94;
      --text-muted:    #5A5754;
      --player-h:      108px;
      --safe-bottom:   env(safe-area-inset-bottom, 0px);
      --radius-sm:     10px;
      --radius-md:     16px;
    }
    html, body {
      height: 100%; background: var(--bg-base); color: var(--text-primary);
      font-family: 'Noto Sans TC', sans-serif; -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 50% -10%, rgba(245,158,11,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 110%, rgba(139,92,246,0.07) 0%, transparent 60%);
      z-index: 0;
    }
    #app {
      position: relative; z-index: 1; min-height: 100dvh;
      padding-bottom: calc(var(--player-h) + var(--safe-bottom) + 16px);
    }
    header { padding: 52px 24px 16px; display: flex; flex-direction: column; gap: 4px; }
    .header-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.18em; color: var(--amber); text-transform: uppercase; }
    header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }

    /* Region tabs */
    .region-scroll-wrap {
      overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
      padding: 0 16px 14px; display: flex; gap: 8px;
    }
    .region-scroll-wrap::-webkit-scrollbar { display: none; }
    .region-tab {
      flex-shrink: 0; padding: 7px 14px; border-radius: 999px;
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-secondary); font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
      font-weight: 500; cursor: pointer; white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .region-tab.active { background: var(--amber-dim); border-color: rgba(245,158,11,0.45); color: var(--amber); }

    /* Groups */
    .region-group { display: none; }
    .region-group.visible { display: block; }
    .region-label {
      font-size: 10px; font-weight: 500; letter-spacing: 0.12em; color: var(--text-muted);
      text-transform: uppercase; padding: 8px 24px 10px; font-family: 'Space Mono', monospace;
    }

    /* Cards */
    #station-list { display: flex; flex-direction: column; gap: 6px; padding: 0 14px; }
    .station-card {
      display: flex; align-items: center; gap: 14px; padding: 12px 14px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md);
      cursor: pointer; transition: background 0.18s, border-color 0.18s, transform 0.1s;
      -webkit-tap-highlight-color: transparent; min-height: 66px; position: relative; overflow: hidden;
    }
    .station-card:active { transform: scale(0.98); }
    .station-card:hover, .station-card:focus-visible { background: var(--bg-card-hover); border-color: var(--border-hover); outline: none; }
    .station-card.active { background: var(--amber-dim); border-color: rgba(245,158,11,0.4); }
    .station-card.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--amber); border-radius: 0 2px 2px 0; }
    .station-icon { width: 42px; height: 42px; border-radius: var(--radius-sm); background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 19px; }
    .station-card.active .station-icon { background: var(--amber-dim); }
    .station-info { flex: 1; min-width: 0; }
    .station-name { font-size: 14px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .station-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; }
    .station-card.active .station-name { color: var(--amber); }
    .eq-bars { display: none; align-items: flex-end; gap: 2px; height: 16px; }
    .station-card.active.playing .eq-bars { display: flex; }
    .eq-bar { width: 3px; background: var(--amber); border-radius: 2px; animation: eq 0.9s ease-in-out infinite alternate; }
    .eq-bar:nth-child(1){animation-duration:.7s;animation-delay:0s}
    .eq-bar:nth-child(2){animation-duration:.5s;animation-delay:.1s}
    .eq-bar:nth-child(3){animation-duration:.6s;animation-delay:.05s}
    .eq-bar:nth-child(4){animation-duration:.8s;animation-delay:.15s}
    @keyframes eq { from { height: 4px; opacity: 0.5; } to { height: 16px; opacity: 1; } }
    .live-badge { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; letter-spacing:.1em; padding:2px 6px; border-radius:4px; background:rgba(239,68,68,.18); color:#F87171; border:1px solid rgba(239,68,68,.25); }

    /* Player */
    #player { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding: 12px 16px calc(12px + var(--safe-bottom)); background: rgba(10,10,18,.88); backdrop-filter: blur(24px) saturate(160%); -webkit-backdrop-filter: blur(24px) saturate(160%); border-top: 1px solid var(--border); }
    #player::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--amber),rgba(245,158,11,.2)); opacity:0; transition:opacity .3s; }
    #player.active::before { opacity:1; }
    .player-inner { display:flex; align-items:center; gap:14px; max-width:500px; margin:0 auto; }
    .player-art { width:48px; height:48px; border-radius:var(--radius-sm); background:var(--bg-surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; transition:border-color .3s; }
    #player.active .player-art { border-color:rgba(245,158,11,.4); }
    .player-meta { flex:1; min-width:0; }
    #player-station-name { font-size:14px; font-weight:500; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    #player-status { font-family:'Space Mono',monospace; font-size:10px; color:var(--text-muted); margin-top:2px; }
    #player.active #player-status { color:var(--amber); }
    #play-pause-btn { width:52px; height:52px; border-radius:50%; background:var(--amber); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 0 24px var(--amber-glow); transition:transform .12s,box-shadow .2s; -webkit-tap-highlight-color:transparent; }
    #play-pause-btn:active { transform:scale(.92); box-shadow:0 0 12px var(--amber-glow); }
    #play-pause-btn:disabled { background:#3A3A40; box-shadow:none; cursor:default; }
    .icon-play { width:0; height:0; border-style:solid; border-width:9px 0 9px 16px; border-color:transparent transparent transparent #0A0A0F; margin-left:3px; }
    .icon-pause { display:none; gap:5px; }
    .icon-pause span { display:block; width:4px; height:16px; background:#0A0A0F; border-radius:2px; }
    .btn-spin { display:none; width:22px; height:22px; border:3px solid rgba(10,10,15,.3); border-top-color:#0A0A0F; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin{to{transform:rotate(360deg)}}
    #play-pause-btn.loading .icon-play,#play-pause-btn.loading .icon-pause{display:none}
    #play-pause-btn.loading .btn-spin{display:block}
    #play-pause-btn.paused .icon-play{display:block}
    #play-pause-btn.playing .icon-play{display:none}
    #play-pause-btn.playing .icon-pause{display:flex}
    #audio{display:none}
  </style>

      {name:'微微笑 噶瑪蘭廣播 FM97.9 宜蘭',url:'http://61.220.209.152:8081/',                                                                    icon:'🌾',genre:'LOCAL'},
      {name:'花蓮希望之聲 FM90.5',          url:'http://61.219.59.31:8081/',                                                                      icon:'🌅',genre:'REL'},
      {name:'東華之聲 (花蓮大學)',           url:'http://radio.ndhu.edu.tw/radio.mp3',                                                             icon:'🎓',genre:'UNI'},
      {name:'花蓮燕聲廣播 AM1242',          url:'http://43.254.16.40:8000/HL.AM1242',                                                             icon:'📻',genre:'AM'},
      {name:'農鄉廣播電台 FM106.3 宜蘭',    url:'http://43.254.16.40:8000/YL.FM106.3',                                                            icon:'🚜',genre:'LOCAL'},
      {name:'濁水溪廣播 FM90.1 宜蘭',       url:'http://43.254.16.40:8000/YL.FM90.1',                                                             icon:'💧',genre:'LOCAL'},
    ]
  },
  {
    id:'islands', label:'外島 / 離島',
    stations:[
      {name:'微微笑 大金廣播 FM106.3 金門', url:'http://211.72.65.63:8080/',                                                                      icon:'🏝️',genre:'LOCAL'},
      {name:'益世電台 AM1404 基隆',         url:'http://43.254.16.40:8000/KL.AM1404',                                                             icon:'⚓',genre:'REL'},
      {name:'勝利澎湖馬公台 AM756',          url:'http://43.254.16.40:8000/PH.AM756',                                                             icon:'🌊',genre:'GOV'},
    ]
  },
];

// ── Core state ────────────────────────────────────────────
const audio    = document.getElementById('audio');
const listEl   = document.getElementById('station-list');
const playerEl = document.getElementById('player');
const btnEl    = document.getElementById('play-pause-btn');
const nameEl   = document.getElementById('player-station-name');
const statusEl = document.getElementById('player-status');
const artEl    = document.getElementById('player-art');
const tabsEl   = document.getElementById('region-tabs');

let hls = null, currentStation = null, isPlaying = false;
let allCards = [];

// ── Build tabs ────────────────────────────────────────────
function makeTab(id, label, active) {
  const btn = document.createElement('button');
  btn.className = 'region-tab' + (active ? ' active' : '');
  btn.textContent = label;
  btn.dataset.region = id;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.region-tab').forEach(t => t.classList.toggle('active', t.dataset.region === id));
    document.querySelectorAll('.region-group').forEach(g => g.classList.toggle('visible', id === 'all' || g.dataset.region === id));
  });
  tabsEl.appendChild(btn);
}
makeTab('all', '全部', true);
regions.forEach(r => makeTab(r.id, r.label, false));

// ── Build cards ───────────────────────────────────────────
regions.forEach(region => {
  const group = document.createElement('div');
  group.className = 'region-group visible';
  group.dataset.region = region.id;

  const lbl = document.createElement('div');
  lbl.className = 'region-label';
  lbl.textContent = region.label;
  group.appendChild(lbl);

  region.stations.forEach(s => {
    const card = document.createElement('div');
    card.className = 'station-card';
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.innerHTML =
      `<div class="station-icon">${s.icon}</div>` +
      `<div class="station-info">` +
        `<div class="station-name">${s.name}</div>` +
        `<div class="station-meta">${s.genre} · LIVE</div>` +
      `</div>` +
      `<span class="live-badge">LIVE</span>` +
      `<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>`;
    card.addEventListener('click', () => onCardClick(s, card));
    card.addEventListener('keydown', e => (e.key==='Enter'||e.key===' ') && onCardClick(s, card));
    group.appendChild(card);
    allCards.push({ card, station: s });
  });

  listEl.appendChild(group);
});

// ── Playback ──────────────────────────────────────────────
function onCardClick(s, card) {
  if (currentStation && currentStation.name === s.name) { togglePlayPause(); return; }
  loadStation(s, card);
}

function loadStation(s, card) {
  if (hls) { hls.destroy(); hls = null; }
  audio.pause(); audio.src = '';

  currentStation = s;
  allCards.forEach(({card:c}) => { c.classList.remove('active','playing'); c.querySelector('.live-badge').style.display=''; });
  card.classList.add('active');
  card.querySelector('.live-badge').style.display = 'none';

  btnEl.disabled = false;
  btnEl.className = 'loading';
  nameEl.textContent = s.name;
  statusEl.textContent = '載入中…';
  artEl.textContent = s.icon;
  playerEl.classList.add('active');

  const url = s.url;
  const isHLS = url.includes('.m3u8') || url.includes('playlist') || url.includes('chunklist');
  if (isHLS) {
    if (Hls.isSupported()) {
      hls = new Hls({ enableWorker: true });
      hls.loadSource(url);
      hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play().catch(()=>{}));
      hls.on(Hls.Events.ERROR, (_,d) => { if(d.fatal) statusEl.textContent='連線失敗，換個電台試試'; });
    } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      audio.src = url; audio.play().catch(()=>{});
    }
  } else {
    audio.src = url; audio.play().catch(()=>{});
  }
  setupMediaSession(s);
}

function togglePlayPause() {
  if (!currentStation) return;
  isPlaying ? audio.pause() : audio.play().catch(()=>{});
}

btnEl.addEventListener('click', togglePlayPause);

audio.addEventListener('playing', () => {
  isPlaying = true; btnEl.className = 'playing'; statusEl.textContent = '● 直播中';
  allCards.forEach(({card,station}) => { if(station.name===currentStation?.name) card.classList.add('playing'); });
});
audio.addEventListener('pause', () => {
  isPlaying = false; btnEl.className = 'paused'; statusEl.textContent = '已暫停';
  allCards.forEach(({card}) => card.classList.remove('playing'));
});
audio.addEventListener('waiting', () => { btnEl.className='loading'; statusEl.textContent='緩衝中…'; });
audio.addEventListener('error', () => { btnEl.className='paused'; statusEl.textContent='播放錯誤，請換一個電台'; });

function setupMediaSession(s) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: s.name, artist: '台灣線上廣播', album: 'Live Radio',
    artwork: [{ src:'https://cdn-icons-png.flaticon.com/512/3239/3239594.png', sizes:'512x512', type:'image/png' }]
  });
  navigator.mediaSession.setActionHandler('play', () => audio.play());
  navigator.mediaSession.setActionHandler('pause', () => audio.pause());
}
</script>
