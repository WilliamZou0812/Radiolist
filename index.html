<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>台灣廣播 Radiolist</title>

  <link rel="icon" type="image/png" href="icon-cute-radio.png" />
  <link rel="apple-touch-icon" href="icon-cute-radio.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0A0A0F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="台灣廣播" />

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    /* ── Variables ─────────────────────────────────── */
    :root {
      --bg-base:       #0A0A0F;
      --bg-surface:    #12121A;
      --bg-card:       rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.07);
      --border:        rgba(255,255,255,0.07);
      --amber:         #F59E0B;
      --amber-dim:     rgba(245,158,11,0.14);
      --amber-glow:    rgba(245,158,11,0.3);
      --red:           #EF4444;
      --text-primary:  #F0EDE6;
      --text-muted:    #5A5754;
      --text-sub:      #9D9A94;
      --player-h:      118px; /* main row + volume row */
      --safe-bottom:   env(safe-area-inset-bottom, 0px);
      --safe-top:      env(safe-area-inset-top, 0px);
    }

    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Noto Sans TC', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      overscroll-behavior: none;
    }
    button { font-family: inherit; }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 40% at 50% -5%, rgba(245,158,11,.09) 0%, transparent 60%),
        radial-gradient(ellipse 35% 25% at 85% 105%, rgba(139,92,246,.06) 0%, transparent 55%);
    }

    /* ── App Shell ─────────────────────────────────── */
    #app {
      position: relative; z-index: 1; min-height: 100dvh;
      padding-bottom: calc(var(--player-h) + var(--safe-bottom) + 16px);
    }

    /* ── Header ────────────────────────────────────── */
    header { padding: calc(var(--safe-top) + 48px) 20px 12px; }
    .header-sup {
      font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: .18em; color: var(--amber);
      text-transform: uppercase; margin-bottom: 4px;
    }
    h1 { font-size: 24px; font-weight: 700; letter-spacing: -.02em; }

    /* ── Search bar ────────────────────────────────── */
    .search-wrap {
      padding: 12px 20px 4px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute; left: 34px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--text-muted); pointer-events: none;
    }
    #search-input {
      width: 100%; padding: 10px 14px 10px 38px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 12px; color: var(--text-primary);
      font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
      outline: none; transition: border-color .2s, background .2s;
    }
    #search-input::placeholder { color: var(--text-muted); }
    #search-input:focus {
      border-color: rgba(245,158,11,.4);
      background: rgba(255,255,255,.07);
    }
    #search-clear {
      position: absolute; right: 28px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted);
      font-size: 18px; cursor: pointer; padding: 4px 8px; display: none;
      line-height: 1;
    }
    #search-no-result {
      display: none; text-align: center; padding: 40px 20px;
      color: var(--text-muted); font-size: 14px;
    }

    /* ── Region tabs ───────────────────────────────── */
    .tabs-wrap {
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; padding: 12px 20px 14px;
      display: flex; gap: 8px;
    }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .region-tab {
      flex-shrink: 0; padding: 7px 14px; border-radius: 999px;
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-sub); font-size: 13px; cursor: pointer;
      white-space: nowrap; transition: background .15s, border-color .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .region-tab.active { background: var(--amber-dim); border-color: rgba(245,158,11,.45); color: var(--amber); }

    /* ── Station list ──────────────────────────────── */
    #station-list { display: flex; flex-direction: column; gap: 6px; padding: 0 14px; }
    .region-group { display: none; }
    .region-group.visible { display: block; }
    .region-label {
      font-size: 10px; color: var(--text-muted); padding: 10px 10px 8px;
      text-transform: uppercase; font-family: 'Space Mono', monospace; letter-spacing: .1em;
    }
    .empty-hint {
      text-align: center; padding: 28px 20px;
      color: var(--text-muted); font-size: 13px; line-height: 1.6;
    }

    /* ── Station card ──────────────────────────────── */
    .station-card {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 12px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 14px;
      cursor: pointer; min-height: 64px; position: relative;
      overflow: hidden; transition: background .18s, border-color .18s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .station-card:active { transform: scale(.985); }
    .station-card:hover { background: var(--bg-card-hover); border-color: rgba(255,255,255,.12); }
    .station-card:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }
    .station-card.active {
      background: var(--amber-dim); border-color: rgba(245,158,11,.42);
    }
    .station-card.active::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--amber); border-radius: 0 2px 2px 0;
    }
    .station-card.error { border-color: rgba(239,68,68,.4); }

    /* icon + health dot */
    .s-icon {
      width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
      background: rgba(255,255,255,.06); display: flex; align-items: center;
      justify-content: center; font-size: 19px; position: relative;
      transition: background .2s;
    }
    .station-card.active .s-icon { background: rgba(245,158,11,.18); }
    .health-dot {
      position: absolute; bottom: 1px; right: 1px;
      width: 8px; height: 8px; border-radius: 50%;
      border: 1.5px solid var(--bg-base);
      background: #3A3A3A; /* default: unknown */
      transition: background .4s;
    }
    .health-dot.ok     { background: #22C55E; }
    .health-dot.error  { background: #EF4444; }
    .health-dot.http   { background: #EAB308; }
    .health-dot.loading { background: #3A3A3A; animation: pulse-dot 1s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:.4} 50%{opacity:1} }

    /* info */
    .s-info { flex: 1; min-width: 0; }
    .s-name {
      font-size: 14px; font-weight: 500; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .s-meta {
      font-size: 10px; color: var(--text-muted); margin-top: 2px;
      font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: .04em;
    }
    .station-card.active .s-name { color: var(--amber); }

    /* equalizer */
    .eq-bars { display: none; align-items: flex-end; gap: 2px; height: 15px; flex-shrink: 0; }
    .station-card.active.playing .eq-bars { display: flex; }
    .eq-bar { width: 3px; border-radius: 2px; background: var(--amber); animation: eq .9s ease-in-out infinite alternate; }
    .eq-bar:nth-child(1){animation-duration:.7s}
    .eq-bar:nth-child(2){animation-duration:.5s;animation-delay:.1s}
    .eq-bar:nth-child(3){animation-duration:.6s;animation-delay:.05s}
    .eq-bar:nth-child(4){animation-duration:.8s;animation-delay:.15s}
    @keyframes eq { from{height:3px;opacity:.5} to{height:15px;opacity:1} }

    /* favorite button */
    .fav-btn {
      width: 38px; height: 38px; flex-shrink: 0; border: none;
      background: none; color: var(--text-muted); font-size: 18px;
      cursor: pointer; border-radius: 8px; display: flex;
      align-items: center; justify-content: center;
      transition: color .2s, transform .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .fav-btn:active { transform: scale(.85); }
    .fav-btn.on { color: var(--amber); }

    /* ── Bottom Player ─────────────────────────────── */
    #player {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(8, 8, 15, .92);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border-top: 1px solid rgba(255,255,255,.1);
      padding-bottom: var(--safe-bottom);
    }
    /* amber accent bar */
    #player::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--amber), rgba(245,158,11,.1));
      opacity: 0; transition: opacity .35s;
    }
    #player.active::before { opacity: 1; }

    /* main row */
    .player-main {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px 6px; max-width: 600px; margin: 0 auto;
    }
    .p-art {
      width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
      background: var(--bg-surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; transition: border-color .3s;
    }
    #player.active .p-art { border-color: rgba(245,158,11,.4); }
    .p-meta { flex: 1; min-width: 0; }
    #p-name {
      font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #p-status {
      font-size: 10px; color: var(--text-muted);
      font-family: 'Space Mono', monospace; margin-top: 2px;
      transition: color .3s;
    }
    #player.active #p-status { color: var(--amber); }

    /* sleep timer button */
    #sleep-btn {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      background: rgba(255,255,255,.05); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 13px; cursor: pointer;
      font-family: 'Space Mono', monospace; letter-spacing: -.02em;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s, color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    #sleep-btn.active {
      background: rgba(245,158,11,.15); border-color: rgba(245,158,11,.4);
      color: var(--amber);
    }

    /* play/pause button */
    #play-btn {
      width: 50px; height: 50px; border-radius: 50%; flex-shrink: 0;
      background: var(--amber); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px var(--amber-glow);
      transition: transform .12s, box-shadow .2s, background .2s;
      -webkit-tap-highlight-color: transparent;
    }
    #play-btn:active { transform: scale(.9); box-shadow: 0 0 8px var(--amber-glow); }
    #play-btn:disabled { background: #2A2A30; box-shadow: none; cursor: default; }
    .icon-play {
      width: 0; height: 0; border-style: solid;
      border-width: 8px 0 8px 14px;
      border-color: transparent transparent transparent #0A0A0F;
      margin-left: 3px;
    }
    .icon-pause { display: none; gap: 4px; }
    .icon-pause span { display: block; width: 4px; height: 15px; background: #0A0A0F; border-radius: 2px; }
    .icon-spin {
      display: none; width: 20px; height: 20px;
      border: 3px solid rgba(10,10,15,.25); border-top-color: #0A0A0F;
      border-radius: 50%; animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #play-btn.loading .icon-play  { display: none; }
    #play-btn.loading .icon-pause { display: none; }
    #play-btn.loading .icon-spin  { display: block; }
    #play-btn.playing .icon-play  { display: none; }
    #play-btn.playing .icon-pause { display: flex; }

    /* volume row */
    .player-vol {
      display: flex; align-items: center; gap: 8px;
      padding: 0 16px 10px; max-width: 600px; margin: 0 auto;
    }
    .vol-icon { font-size: 13px; color: var(--text-muted); flex-shrink: 0; user-select: none; }
    #vol-slider {
      flex: 1; height: 3px; -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,.12); border-radius: 3px; outline: none;
      cursor: pointer;
    }
    #vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px;
      border-radius: 50%; background: var(--amber); cursor: pointer;
      box-shadow: 0 0 6px rgba(245,158,11,.5);
    }
    #vol-slider::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%; background: var(--amber);
      border: none; cursor: pointer;
    }
    .vol-pct {
      font-size: 10px; font-family: 'Space Mono', monospace;
      color: var(--text-muted); width: 30px; text-align: right; flex-shrink: 0;
    }

    /* ── Guide Modal (HTTP mixed content) ──────────── */
    #guide-modal {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,.85); backdrop-filter: blur(12px);
      align-items: center; justify-content: center; padding: 24px;
    }
    .modal-box {
      background: #16161F; padding: 24px; border-radius: 20px;
      max-width: 380px; width: 100%; border: 1px solid rgba(245,158,11,.4);
    }
    .modal-box h3 { color: var(--amber); margin-bottom: 10px; font-size: 15px; }
    .modal-box p  { font-size: 13px; color: var(--text-sub); margin-bottom: 12px; line-height: 1.55; }
    .step-box {
      background: rgba(255,255,255,.04); padding: 12px;
      border-radius: 10px; font-size: 12px; line-height: 1.7; color: #ccc; margin-bottom: 14px;
    }
    .btn-modal {
      background: var(--amber); border: none; padding: 12px; width: 100%;
      border-radius: 10px; font-weight: 700; cursor: pointer;
      color: #000; font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
    }

    /* hidden */
    #audio { display: none; }
  </style>
</head>

</div>

<!-- HTTP Guide Modal -->
<div id="guide-modal">

      <strong>📱 Android Chrome</strong><br>
      點右上角「⋮」→「網站設定」→「不安全內容」→「允許」<br><br>
      <strong>💡 最佳方案</strong><br>
      部署 <code>cloudflare-proxy.js</code>（附件），<br>可讓所有電台免設定直接播放。

    <button class="btn-modal" id="guide-reload">✓ 已設定，重新整理</button>
    <button class="btn-modal" style="margin-top:8px;background:rgba(255,255,255,.08);color:#ccc;" id="guide-close">先關閉</button>
  </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

// ── DOM refs ────────────────────────────────────────────────────
const audio       = document.getElementById('audio');
const playerEl    = document.getElementById('player');
const playBtn     = document.getElementById('play-btn');
const sleepBtn    = document.getElementById('sleep-btn');
const nameEl      = document.getElementById('p-name');
const statusEl    = document.getElementById('p-status');
const artEl       = document.getElementById('p-art');
const tabsEl      = document.getElementById('region-tabs');
const listEl      = document.getElementById('station-list');
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');
const noResult    = document.getElementById('search-no-result');
const volSlider   = document.getElementById('vol-slider');
const volPct      = document.getElementById('vol-pct');

// ── App state ───────────────────────────────────────────────────
let hls            = null;
let currentStation = null;
let isPlaying      = false;
let currentRegion  = 'all';

// Sleep timer
const SLEEP_STEPS  = [15, 30, 60, 90]; // minutes
let sleepStepIdx   = -1;   // -1 = off
let sleepTimerId   = null;
let sleepFadeId    = null;
let sleepEndTime   = null;
let sleepTickId    = null;

// Card registry (all groups combined)
let allCardEntries = []; // { card, station }

// Separate group container refs
let favGroup    = null;
let recentGroup = null;

// ── localStorage helpers ────────────────────────────────────────
function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

let favorites = lsGet('tw_radio_fav', []);    // array of station names
let recents   = lsGet('tw_radio_recent', []); // array of {name,url,icon,genre}

function saveFavorites() { lsSet('tw_radio_fav', favorites); }
function saveRecents()   { lsSet('tw_radio_recent', recents); }

function isFav(name) { return favorites.includes(name); }

function toggleFav(name) {
  if (isFav(name)) {
    favorites = favorites.filter(n => n !== name);
  } else {
    favorites = [name, ...favorites];
  }
  saveFavorites();
  // update all fav buttons for this station
  allCardEntries.forEach(({ card, station }) => {
    if (station.name === name) {
      const btn = card.querySelector('.fav-btn');
      if (btn) { btn.textContent = isFav(name) ? '★' : '☆'; btn.classList.toggle('on', isFav(name)); }
    }
  });
  rebuildFavGroup();
}

function addRecent(s) {
  recents = [s, ...recents.filter(r => r.name !== s.name)].slice(0, 6);
  saveRecents();
}

// ── Build a station card (factory) ─────────────────────────────
function buildCard(s) {
  const card = document.createElement('div');
  card.className = 'station-card';
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');
  card.setAttribute('data-name', s.name);

  // Health dot
  card.innerHTML =
    `<div class="s-icon">${s.icon}<span class="health-dot loading"></span></div>` +
    `<div class="s-info">` +
      `<div class="s-name">${s.name}</div>` +
      `<div class="s-meta">${s.genre}</div>` +
    `</div>` +
    `<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>` +
    `<button class="fav-btn ${isFav(s.name) ? 'on' : ''}" aria-label="收藏" title="收藏 / 取消收藏">${isFav(s.name) ? '★' : '☆'}</button>`;

  // Fav button — stop propagation so card click doesn't fire
  const favB = card.querySelector('.fav-btn');
  favB.addEventListener('click', e => { e.stopPropagation(); toggleFav(s.name); });
  favB.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.stopPropagation(); e.preventDefault(); toggleFav(s.name); } });

  // Card click
  card.addEventListener('click', () => onCardClick(s, card));
  card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onCardClick(s, card); } });

  return card;
}

// ── Build tabs ──────────────────────────────────────────────────
function buildTabs() {
  const tabDefs = [
    { id: 'all',    label: '全部'    },
    { id: 'fav',    label: '★ 我的最愛' },
    { id: 'recent', label: '🕘 最近播放' },
    ...REGIONS.map(r => ({ id: r.id, label: r.label })),
  ];

  tabDefs.forEach((t, idx) => {
    const btn = document.createElement('button');
    btn.className = 'region-tab' + (idx === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.dataset.rid = t.id;
    btn.addEventListener('click', () => switchRegion(t.id, btn));
    tabsEl.appendChild(btn);
  });
}

function switchRegion(id, clickedBtn) {
  currentRegion = id;
  document.querySelectorAll('.region-tab').forEach(t => t.classList.toggle('active', t.dataset.rid === id));

  // Clear search when switching tabs
  if (searchInput.value) clearSearch();

  document.querySelectorAll('.region-group').forEach(g => {
    const gid = g.dataset.rid;
    let show = false;
    if (id === 'all')    show = (gid !== 'fav' && gid !== 'recent');
    else                  show = (gid === id);
    g.classList.toggle('visible', show);
  });

  updateActiveStates();
}

// ── Build main region groups ────────────────────────────────────
function buildMainGroups() {
  // Favorites group
  favGroup = document.createElement('div');
  favGroup.className = 'region-group';
  favGroup.dataset.rid = 'fav';
  listEl.appendChild(favGroup);
  rebuildFavGroup();

  // Recents group
  recentGroup = document.createElement('div');
  recentGroup.className = 'region-group';
  recentGroup.dataset.rid = 'recent';
  listEl.appendChild(recentGroup);
  rebuildRecentGroup();

  // Regional groups
  REGIONS.forEach(region => {
    const group = document.createElement('div');
    group.className = 'region-group visible';
    group.dataset.rid = region.id;

    const lbl = document.createElement('div');
    lbl.className = 'region-label';
    lbl.textContent = region.label;
    group.appendChild(lbl);

    region.stations.forEach(s => {
      const card = buildCard(s);
      group.appendChild(card);
      allCardEntries.push({ card, station: s });
    });

    listEl.appendChild(group);
  });
}

function rebuildFavGroup() {
  // Remove old fav card entries
  allCardEntries = allCardEntries.filter(e => e.card.closest('[data-rid="fav"]') === null);

  favGroup.innerHTML = '';
  const lbl = document.createElement('div');
  lbl.className = 'region-label';
  lbl.textContent = favorites.length ? '已收藏的電台' : '我的最愛';
  favGroup.appendChild(lbl);

  if (!favorites.length) {
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.textContent = '點擊電台卡片右側的 ☆ 即可收藏，\n方便下次快速找到常聽的電台。';
    favGroup.appendChild(hint);
    return;
  }

  favorites.forEach(name => {
    let s = null;
    REGIONS.forEach(r => { const f = r.stations.find(st => st.name === name); if (f) s = f; });
    if (!s) return;
    const card = buildCard(s);
    favGroup.appendChild(card);
    allCardEntries.push({ card, station: s });
  });

  updateActiveStates();
  scheduleHealthCheck();
}

function rebuildRecentGroup() {
  // Remove old recent card entries
  allCardEntries = allCardEntries.filter(e => e.card.closest('[data-rid="recent"]') === null);

  recentGroup.innerHTML = '';
  const lbl = document.createElement('div');
  lbl.className = 'region-label';
  lbl.textContent = recents.length ? '最近播放' : '最近播放';
  recentGroup.appendChild(lbl);

  if (!recents.length) {
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.textContent = '播放電台後會自動記錄在這裡，\n最多保留 6 個。';
    recentGroup.appendChild(hint);
    return;
  }

  recents.forEach(s => {
    const card = buildCard(s);
    recentGroup.appendChild(card);
    allCardEntries.push({ card, station: s });
  });

  updateActiveStates();
  scheduleHealthCheck();
}

// ── Active state ────────────────────────────────────────────────
function updateActiveStates() {
  allCardEntries.forEach(({ card, station }) => {
    const isActive  = currentStation && station.name === currentStation.name;
    const isPlaying2 = isActive && isPlaying;
    card.classList.toggle('active',  isActive);
    card.classList.toggle('playing', isPlaying2);
  });
}

// ── Search ──────────────────────────────────────────────────────
function handleSearch() {
  const q = searchInput.value.trim().toLowerCase();
  searchClear.style.display = q ? 'flex' : 'none';

  if (!q) {
    // Restore tab view
    allCardEntries.forEach(({ card }) => card.style.display = '');
    document.querySelectorAll('.region-label, .empty-hint').forEach(el => el.style.display = '');
    switchRegion(currentRegion, null);
    noResult.style.display = 'none';
    return;
  }

  // Show all groups
  document.querySelectorAll('.region-group').forEach(g => g.classList.add('visible'));
  document.querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.region-label, .empty-hint').forEach(el => el.style.display = 'none');

  let anyVisible = false;
  allCardEntries.forEach(({ card, station }) => {
    const match = station.name.toLowerCase().includes(q) || station.genre.toLowerCase().includes(q);
    card.style.display = match ? '' : 'none';
    if (match) anyVisible = true;
  });
  noResult.style.display = anyVisible ? 'none' : 'block';
}

function clearSearch() {
  searchInput.value = '';
  handleSearch();
  searchInput.blur();
}

searchInput.addEventListener('input', handleSearch);
searchClear.addEventListener('click', clearSearch);

// ── Playback ────────────────────────────────────────────────────
function onCardClick(s, card) {
  if (currentStation && currentStation.name === s.name) {
    togglePlay();
    return;
  }
  loadStation(s, card);
}

function loadStation(s, card) {
  if (hls) { hls.destroy(); hls = null; }
  audio.pause();
  audio.src = '';

  currentStation = s;
  addRecent(s);
  rebuildRecentGroup();

  // Clear all active states
  allCardEntries.forEach(({ card: c }) => c.classList.remove('active', 'playing', 'error'));
  card.classList.add('active');

  playBtn.disabled     = false;
  playBtn.className    = 'loading';
  nameEl.textContent   = s.name;
  statusEl.textContent = '載入中…';
  statusEl.style.color = '';
  artEl.textContent    = s.icon;
  playerEl.classList.add('active');

  const url   = s.url;
  const isHLS = /\.(m3u8|m3u)/.test(url) || /playlist|chunklist/.test(url);

  if (isHLS) {
    if (Hls.isSupported()) {
      hls = new Hls({ enableWorker: true, maxBufferLength: 30 });
      hls.loadSource(url);
      hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play().catch(() => onPlayError(s, card)));
      hls.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) onPlayError(s, card); });
    } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      audio.src = url;
      audio.play().catch(() => onPlayError(s, card));
    }
  } else {
    audio.src = url;
    audio.play().catch(() => onPlayError(s, card));
  }

  setupMediaSession(s);
}

function onPlayError(s, card) {
  card.classList.add('error');
  playBtn.className    = '';
  statusEl.textContent = '播放失敗';
  statusEl.style.color = '#EF4444';
  if (window.location.protocol === 'https:' && s.url.startsWith('http:')) {
    guideModal.style.display = 'flex';
  }
}

function togglePlay() {
  if (!currentStation) return;
  if (isPlaying) { audio.pause(); }
  else           { audio.play().catch(() => {}); }
}

playBtn.addEventListener('click', togglePlay);

audio.addEventListener('playing', () => {
  isPlaying = true;
  playBtn.className    = 'playing';
  statusEl.textContent = '● 直播中';
  statusEl.style.color = '';
  updateActiveStates();
});
audio.addEventListener('pause', () => {
  isPlaying = false;
  playBtn.className    = '';
  statusEl.textContent = currentStation ? '已暫停' : '尚未播放';
  statusEl.style.color = '';
  updateActiveStates();
});
audio.addEventListener('waiting', () => {
  playBtn.className    = 'loading';
  statusEl.textContent = '緩衝中…';
});
audio.addEventListener('error', () => {
  if (!currentStation) return;
  const entry = allCardEntries.find(e => e.station.name === currentStation.name);
  if (entry) onPlayError(currentStation, entry.card);
});

// ── Sleep Timer ─────────────────────────────────────────────────
function clearSleepTimer() {
  if (sleepTimerId)  { clearTimeout(sleepTimerId);   sleepTimerId  = null; }
  if (sleepFadeId)   { clearInterval(sleepFadeId);   sleepFadeId   = null; }
  if (sleepTickId)   { clearInterval(sleepTickId);   sleepTickId   = null; }
  sleepEndTime = null;
  sleepStepIdx = -1;
}

function startSleepTimer(minutes) {
  clearSleepTimer();
  const ms     = minutes * 60 * 1000;
  sleepEndTime = Date.now() + ms;

  sleepTickId = setInterval(updateSleepDisplay, 1000);
  updateSleepDisplay();

  sleepTimerId = setTimeout(() => {
    // Fade out over 8 seconds
    const startVol = audio.volume;
    const steps    = 16;
    let   step     = 0;
    sleepFadeId = setInterval(() => {
      step++;
      audio.volume = Math.max(0, startVol * (1 - step / steps));
      if (step >= steps) {
        clearInterval(sleepFadeId); sleepFadeId = null;
        audio.pause();
        audio.volume  = startVol; // restore
        volSlider.value = startVol;
        clearSleepTimer();
        sleepBtn.textContent = '⏱';
        sleepBtn.classList.remove('active');
        if (currentStation) statusEl.textContent = '睡眠定時停播';
      }
    }, 500);
  }, ms);
}

function updateSleepDisplay() {
  if (!sleepEndTime) return;
  const rem  = Math.max(0, sleepEndTime - Date.now());
  const mins = Math.floor(rem / 60000);
  const secs = Math.floor((rem % 60000) / 1000);
  sleepBtn.textContent = mins > 0
    ? `${mins}m`
    : `${secs}s`;
}

sleepBtn.addEventListener('click', () => {
  // Cycle: -1 → 0 → 1 → 2 → 3 → -1 (off)
  sleepStepIdx = (sleepStepIdx + 1) % (SLEEP_STEPS.length + 1);
  if (sleepStepIdx === SLEEP_STEPS.length) {
    // Back to off
    clearSleepTimer();
    sleepBtn.textContent = '⏱';
    sleepBtn.classList.remove('active');
    if (currentStation && isPlaying) statusEl.textContent = '● 直播中';
    return;
  }
  const minutes = SLEEP_STEPS[sleepStepIdx];
  sleepBtn.classList.add('active');
  startSleepTimer(minutes);
  if (currentStation) statusEl.textContent = `定時 ${minutes} 分後停播`;
});

// ── Health Check ────────────────────────────────────────────────
let healthCheckScheduled = false;

function scheduleHealthCheck() {
  if (healthCheckScheduled) return;
  healthCheckScheduled = true;
  // Run after a short delay so UI renders first
  setTimeout(runHealthChecks, 1000);
}

async function runHealthChecks() {
  const entries = [...allCardEntries]; // snapshot
  let delay     = 0;
  for (const { card, station } of entries) {
    const dot = card.querySelector('.health-dot');
    if (!dot) continue;
    setTimeout(() => checkStation(station.url, dot), delay);
    delay += 120; // stagger by 120ms
  }
}

async function checkStation(url, dot) {
  // HTTP streams can't be checked from HTTPS pages (mixed content)
  if (window.location.protocol === 'https:' && url.startsWith('http:')) {
    dot.className = 'health-dot http';
    dot.title = 'HTTP 串流（需允許混合內容）';
    return;
  }

  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), 8000);

  try {
    await fetch(url, {
      method: 'GET',
      mode:   'no-cors',
      signal: ctrl.signal,
    });
    clearTimeout(tid);
    dot.className = 'health-dot ok';
    dot.title     = '連線正常';
  } catch (e) {
    clearTimeout(tid);
    if (e.name === 'AbortError') {
      dot.className = 'health-dot';
      dot.title     = '連線逾時';
    } else {
      dot.className = 'health-dot error';
      dot.title     = '無法連線';
    }
  }
}

// ── Media Session ───────────────────────────────────────────────
function setupMediaSession(s) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title:   s.name,
    artist:  '台灣廣播 Radiolist',
    album:   'Live FM Radio',
    artwork: [{ src: 'https://cdn-icons-png.flaticon.com/512/3239/3239594.png', sizes: '512x512', type: 'image/png' }],
  });
  navigator.mediaSession.setActionHandler('play',  () => audio.play().catch(() => {}));
  navigator.mediaSession.setActionHandler('pause', () => audio.pause());
  navigator.mediaSession.setActionHandler('stop',  () => { audio.pause(); audio.src = ''; });
}

// ── Service Worker ──────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Init ─────────────────────────────────────────────────────────
buildTabs();
buildMainGroups();
scheduleHealthCheck();

// Restore last played station info (display only, don't auto-play)
const lastStation = lsGet('tw_radio_last', null);
if (lastStation) {
  nameEl.textContent   = lastStation.name;
  artEl.textContent    = lastStation.icon;
  statusEl.textContent = '上次播放';
}
